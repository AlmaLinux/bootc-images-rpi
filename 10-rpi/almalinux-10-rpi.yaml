releasever: 10

repos:
  - baseos
  - appstream
  - raspberrypi

variables:
  distro: "almalinux10"

packages:
  - almalinux-repos
  - almalinux-release-raspberrypi

postprocess:
  - |
    #!/usr/bin/env bash

    set -euo pipefail

    mkdir -p /usr/lib/bootc/install/
    mkdir -p /usr/lib/bootc/kargs.d/
    echo 'kargs = ["console=tty0", "console=ttyAMA10"]' > /usr/lib/bootc/kargs.d/10-consoles.toml
    sed -i 's/console=ttyS0//g' /etc/default/grub || true 
    if [ -d /etc/kernel/cmdline ]; then sed -i 's/console=ttyS0//g' /etc/kernel/cmdline; fi
    cat > /usr/lib/bootc/install/20-rhel.toml << EOF
    [install]
    root-fs-type = "xfs"
    kargs = ["console=tty0", "console=ttyAMA10"]
    EOF
  - |
    #!/usr/bin/env bash
    set -euo pipefail
    dnf clean all
    rm /var/{log,cache,lib}/* -rf
    systemctl preset-all

include:
  - standard/manifest.yaml
