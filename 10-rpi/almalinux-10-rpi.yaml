releasever: 10

repos:
  - baseos
  - appstream
  - raspberrypi

variables:
  distro: "almalinux10"

packages:
  - almalinux-repos
  - almalinux-release-raspberrypi

postprocess:
  - |
    #!/usr/bin/env bash

    set -euo pipefail
    if [ ! -f /usr//lib/firmware/brcm/brcmfmac43436s-sdio.bin  ]; then
      curl -s -o /usr//lib/firmware/brcm/brcmfmac43436s-sdio.bin https://github.com/RPi-Distro/firmware-nonfree/raw/refs/heads/bullseye/debian/config/brcm80211/brcm/brcmfmac43436s-sdio.bin
    ]
    if [ ! -f /usr/lib/firmware/brcm/brcmfmac43430-sdio.raspberrypi,model-zero-2-w.bin ]; then
      ln -s /usr//lib/firmware/brcm/brcmfmac43436s-sdio.bin /usr/lib/firmware/brcm/brcmfmac43430-sdio.raspberrypi,model-zero-2-w.bin
    fi

    mkdir -p /usr/lib/bootc/install/
    cat > /usr/lib/bootc/install/20-rhel.toml << EOF
    [install]
    root-fs-type = "xfs"
    EOF
  - |
    #!/usr/bin/env bash
    set -euo pipefail
    dnf clean all
    rm /var/{log,cache,lib}/* -rf
    systemctl preset-all

include:
  - standard/manifest.yaml
